version: '3.8'

name: oracle-nodejs-restful-apis

services:
  oracle-database-service:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle-database
    ports:
      - "${DEMASY_DB_HOST_PORT}:1521"
      - "5500:5500"
    env_file:
      - .env
    environment:
      - DATABASE_NAME=${DEMASY_DB_NAME}
      - ORACLE_PWD=${DEMASY_DB_PASS}

  restful-apis-service:
    build:
      context: ./
      args:
        - DEMASY_SERVER_PORT=${DEMASY_SERVER_PORT}
    container_name: nodejs-restful-apis
    ports:
      - "${DEMASY_SERVER_PORT}:${DEMASY_SERVER_PORT}"
    depends_on:
      - oracle-database-service
    env_file:
      - .env
    environment:
      - DEMASY_SERVER_PORT=${DEMASY_SERVER_PORT}
      - DEMASY_DB_HOST=${DEMASY_DB_HOST}
      - DEMASY_DB_PORT=${DEMASY_DB_PORT}
      - DEMASY_DB_SERVICE=${DEMASY_DB_SERVICE}
      - DEMASY_DB_USER=${DEMASY_DB_USER}
      - DEMASY_DB_PASS=${DEMASY_DB_PASS}

networks:
  default:
    name: demasy-network